name: craft-ci

on:
  pull_request:
  push:
    branches:
      - main
      - feat/infinite-skill-craft-lab

jobs:
  test:
    name: Type-check, test, and build validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for edge-incompatible filesystem usage
        run: node scripts/check-fs-usage.mjs

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Run craft + mcp unit tests
        run: npm run test

      - name: Run Next.js build
        run: npm run build:next
