name: website-ci

on:
  pull_request:
    paths:
      - 'app/**'
      - 'components/**'
      - 'content/**'
      - 'data/**'
      - 'lib/**'
      - 'scripts/**'
      - 'next.config.mjs'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/website-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'components/**'
      - 'content/**'
      - 'data/**'
      - 'lib/**'
      - 'scripts/**'
      - 'next.config.mjs'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/website-ci.yml'

jobs:
  validate:
    name: Build & Edge Compatibility Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for edge-incompatible filesystem usage
        run: node scripts/check-fs-usage.mjs

      - name: Cache Next.js build artifacts
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', '**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Run Next.js build
        run: npm run build:next
