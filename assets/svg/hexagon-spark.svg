<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none">
  <!-- Outer Hexagon -->
  <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" stroke="url(#rimuru-grad)" stroke-width="3" />
  
  <!-- Inner Hexagon (Offset) -->
  <polygon points="50,15 82,33 82,67 50,85 18,67 18,33" stroke="url(#milim-grad)" stroke-width="1.5" stroke-dasharray="4 2" />
  
  <!-- Spark Core -->
  <path d="M50,30 L53,47 L70,50 L53,53 L50,70 L47,53 L30,50 L47,47 Z" fill="#ec4899" />
  <circle cx="50" cy="50" r="4" fill="#38bdf8" />
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="rimuru-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="milim-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
  </defs>
</svg>
